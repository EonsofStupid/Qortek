name: Bug report
description: Report incorrect behavior
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, commands, commits, or reproduction steps.
    validations:
      required: true
